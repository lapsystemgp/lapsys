name: testly
description: TesTly mobile app — lab-testing marketplace for Egypt.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management / DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Immutable models + JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Secure storage (tokens → Keychain / Keystore)
  flutter_secure_storage: ^9.2.2

  # Non-secret prefs (locale, onboarding flags)
  shared_preferences: ^2.3.3

  # Charts
  fl_chart: ^0.69.0

  # Firebase / push
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5

  # Local notifications (foreground push display + prep reminders)
  flutter_local_notifications: ^18.0.1

  # Maps + location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # PDF viewer
  pdfx: ^2.9.0

  # Offline file cache
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.4

  # Biometrics
  local_auth: ^2.3.0

  # Native share
  share_plus: ^10.1.2

  # Date/number formatting
  intl: ^0.20.2

  # Timezone support for scheduled local notifications
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.4.4
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  # fonts:
