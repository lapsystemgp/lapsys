<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #ffffff; }
  .wrap {
    width: 1200px;
    padding: 36px;
    display: flex; flex-wrap: wrap; gap: 28px;
    justify-content: center; align-items: flex-start;
    background: #ffffff;
  }
  .wrap img {
    height: 740px; width: auto; display: block;
    border: 1px solid #e2e8f0; border-radius: 22px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
  }
</style></head>
<body>
  <div class="wrap">
    <img src="../mobile-screens/mobile-login.png" alt="login">
    <img src="../mobile-screens/mobile-home.png" alt="home">
    <img src="../mobile-screens/mobile-lab-detail.png" alt="lab detail">
    <img src="../mobile-screens/mobile-bookings.png" alt="bookings">
    <img src="../mobile-screens/mobile-trends.png" alt="trends">
  </div>
</body>
</html>
