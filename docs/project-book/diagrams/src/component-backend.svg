<svg width="1250" height="900" viewBox="0 0 1250 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1250" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">TesTly Backend &#8212; Component Diagram (NestJS Modules)</text>
  <text x="32" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">The root AppModule composes eight feature modules; every feature module depends on the shared PrismaModule (data access) and CommonModule (cross-cutting concerns).</text>

  <!-- ===================== ROOT MODULE ===================== -->
  <rect x="470" y="100" width="310" height="96" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2.5"/>
  <text x="625" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">&#171;module&#187;</text>
  <text x="625" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#0B5294">AppModule</text>
  <text x="625" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">root composition + ConfigModule (Joi)</text>

  <!-- ===================== FEATURE MODULES ROW LABEL ===================== -->
  <text x="32" y="262" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#6B7280" letter-spacing="1">FEATURE MODULES</text>

  <!-- ===================== FEATURE MODULES (2 rows x 4 cols) ===================== -->
  <!-- Geometry: 4 columns. col x = 70, 365, 660, 955 ; width 225 ; row1 y=290 ; row2 y=470 ; height 130 -->

  <!-- Row 1, Col 1: AuthModule -->
  <rect x="70" y="290" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="182" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="182" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">AuthModule</text>
  <line x1="90" y1="352" x2="275" y2="352" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="182" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">JWT + Passport, guards</text>
  <text x="182" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">register / login / refresh</text>
  <text x="182" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">JwtStrategy &#183; RolesGuard</text>

  <!-- Row 1, Col 2: PublicModule -->
  <rect x="365" y="290" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="477" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="477" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">PublicModule</text>
  <line x1="385" y1="352" x2="570" y2="352" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="477" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">unauthenticated catalog</text>
  <text x="477" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">labs &amp; tests browse</text>
  <text x="477" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">search + filters</text>

  <!-- Row 1, Col 3: BookingsModule -->
  <rect x="660" y="290" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="772" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="772" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">BookingsModule</text>
  <line x1="680" y1="352" x2="865" y2="352" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="772" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">booking lifecycle</text>
  <text x="772" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">payment + status events</text>
  <text x="772" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">order tracking timeline</text>

  <!-- Row 1, Col 4: ApiModule -->
  <rect x="955" y="290" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="1067" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="1067" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">ApiModule</text>
  <line x1="975" y1="352" x2="1160" y2="352" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="1067" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Patient + Lab workspaces</text>
  <text x="1067" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">results + structured data</text>
  <text x="1067" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">LabStorage (local / S3)</text>

  <!-- Row 2, Col 1: AdminModule -->
  <rect x="70" y="470" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="182" y="496" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="182" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">AdminModule</text>
  <line x1="90" y1="532" x2="275" y2="532" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="182" y="552" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">lab onboarding review</text>
  <text x="182" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">approve / suspend labs</text>
  <text x="182" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">audit log governance</text>

  <!-- Row 2, Col 2: ChatModule -->
  <rect x="365" y="470" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="477" y="496" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="477" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">ChatModule</text>
  <line x1="385" y1="532" x2="570" y2="532" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="477" y="552" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">agentic AI assistant</text>
  <text x="477" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Gemini + tool calling</text>
  <text x="477" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">SSE streaming</text>

  <!-- Row 2, Col 3: FaqModule -->
  <rect x="660" y="470" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="772" y="496" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="772" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">FaqModule</text>
  <line x1="680" y1="532" x2="865" y2="532" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="772" y="552" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">FAQ search + ask</text>
  <text x="772" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">guided intents</text>
  <text x="772" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">low-cost help (no LLM)</text>

  <!-- Row 2, Col 4: NotificationsModule -->
  <rect x="955" y="470" width="225" height="132" rx="10" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="1067" y="496" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="1067" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">NotificationsModule</text>
  <line x1="975" y1="532" x2="1160" y2="532" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="1067" y="552" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Firebase push (FCM)</text>
  <text x="1067" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">device-token registry</text>
  <text x="1067" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">exports NotificationsService</text>

  <!-- ===================== SHARED MODULES ROW LABEL ===================== -->
  <text x="32" y="700" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#6B7280" letter-spacing="1">SHARED MODULES</text>

  <!-- ===================== SHARED MODULES ===================== -->
  <!-- PrismaModule -->
  <rect x="265" y="724" width="320" height="120" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2.5"/>
  <text x="425" y="750" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="425" y="774" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#0B5294">PrismaModule</text>
  <line x1="285" y1="786" x2="565" y2="786" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="425" y="806" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">PrismaService &#8594; PostgreSQL</text>
  <text x="425" y="826" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">retry middleware for serverless cold-starts</text>

  <!-- CommonModule -->
  <rect x="665" y="724" width="320" height="120" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2.5"/>
  <text x="825" y="750" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">&#171;module&#187;</text>
  <text x="825" y="774" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#0B5294">CommonModule</text>
  <line x1="685" y1="786" x2="965" y2="786" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="825" y="806" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">HttpExceptionFilter, ValidationPipe</text>
  <text x="825" y="826" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280">AuditLogService &#183; shared utilities</text>

  <!-- ===================== ARROWS: AppModule -> feature modules ===================== -->
  <!-- AppModule bottom-center anchor approx (625,196). Route to top of each feature box. -->
  <!-- Row 1 -->
  <path d="M520,184 C360,210 182,250 182,288" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M560,196 C500,230 477,255 477,288" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M690,196 C740,230 772,255 772,288" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M730,184 C900,210 1067,250 1067,288" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Row 2 (longer routes hugging outer sides) -->
  <path d="M470,168 C150,200 60,330 60,468 L82,468" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540,196 C430,300 420,400 442,468" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M710,196 C800,300 800,400 790,468" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M780,168 C1110,200 1190,330 1190,468 L1168,468" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- "imports" label near AppModule outgoing edges -->
  <rect x="588" y="222" width="74" height="20" fill="#FFFFFF"/>
  <text x="592" y="237" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">imports</text>

  <!-- ===================== ARROWS: feature modules -> shared modules ===================== -->
  <!-- All eight feature modules depend on PrismaModule and CommonModule. To keep the canvas readable,
       every module drops a short connector into a horizontal dependency bus at y=660, which then
       feeds two trunks down into PrismaModule and CommonModule. -->

  <!-- Row 1 modules drop into the bus via the gutters between columns (x = 330, 625, 920),
       so they never cross the row-2 boxes. -->
  <path d="M227,422 L227,445 L330,445 L330,660" fill="none" stroke="#0F6FC6" stroke-width="2"/>
  <path d="M522,422 L522,445 L625,445 L625,660" fill="none" stroke="#0F6FC6" stroke-width="2"/>
  <path d="M817,422 L817,445 L920,445 L920,660" fill="none" stroke="#0F6FC6" stroke-width="2"/>
  <path d="M1112,422 L1112,445 L1215,445 L1215,660 L1067,660" fill="none" stroke="#0F6FC6" stroke-width="2"/>

  <!-- Row 2 modules drop straight down into the bus -->
  <line x1="182" y1="602" x2="182" y2="660" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="477" y1="602" x2="477" y2="660" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="772" y1="602" x2="772" y2="660" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="1067" y1="602" x2="1067" y2="660" stroke="#0F6FC6" stroke-width="2"/>

  <!-- the horizontal collector / dependency bus -->
  <line x1="182" y1="660" x2="1067" y2="660" stroke="#0F6FC6" stroke-width="2"/>

  <!-- bus junction dots for clarity -->
  <circle cx="330" cy="660" r="3.5" fill="#0F6FC6"/>
  <circle cx="625" cy="660" r="3.5" fill="#0F6FC6"/>
  <circle cx="920" cy="660" r="3.5" fill="#0F6FC6"/>
  <circle cx="182" cy="660" r="3.5" fill="#0F6FC6"/>
  <circle cx="477" cy="660" r="3.5" fill="#0F6FC6"/>
  <circle cx="772" cy="660" r="3.5" fill="#0F6FC6"/>
  <circle cx="1067" cy="660" r="3.5" fill="#0F6FC6"/>

  <!-- trunks from bus down to the two shared modules -->
  <path d="M425,660 L425,722" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M825,660 L825,722" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- "depends on (all feature modules)" label, raised above the bus in the open 625-772 gap -->
  <rect x="635" y="624" width="166" height="20" fill="#FFFFFF"/>
  <text x="639" y="639" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">depends on (all 8 modules)</text>

  <!-- legend -->
  <rect x="32" y="858" width="18" height="14" rx="3" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="58" y="870" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">composition root / shared infrastructure module</text>
  <rect x="430" y="858" width="18" height="14" rx="3" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="456" y="870" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">feature module</text>
  <line x1="610" y1="865" x2="648" y2="865" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="656" y="870" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">dependency (imports / injects)</text>
</svg>
