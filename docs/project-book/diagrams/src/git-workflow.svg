<svg width="1240" height="600" viewBox="0 0 1240 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="600" fill="#FFFFFF"/>

  <text x="32" y="46" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">TesTly — Git Workflow &amp; Continuous Delivery</text>
  <text x="32" y="70" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">Feature branches merge into main through pull requests; a merge triggers automated deploy</text>

  <!-- ===== main branch ===== -->
  <text x="95" y="155" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="end">main</text>
  <line x1="150" y1="150" x2="900" y2="150" stroke="#0B5294" stroke-width="3"/>
  <circle cx="200" cy="150" r="8" fill="#0B5294"/>
  <circle cx="380" cy="150" r="8" fill="#0B5294"/>
  <circle cx="600" cy="150" r="8" fill="#0B5294"/>
  <circle cx="820" cy="150" r="8" fill="#0B5294"/>
  <circle cx="900" cy="150" r="8" fill="#0B5294"/>

  <!-- ===== feature branch 1 ===== -->
  <path d="M380,150 C 410,150 410,232 442,232" fill="none" stroke="#0F6FC6" stroke-width="2.5"/>
  <line x1="442" y1="232" x2="520" y2="232" stroke="#0F6FC6" stroke-width="2.5"/>
  <path d="M520,232 C 568,232 570,150 600,150" fill="none" stroke="#0F6FC6" stroke-width="2.5"/>
  <circle cx="442" cy="232" r="7" fill="#0F6FC6"/>
  <circle cx="520" cy="232" r="7" fill="#0F6FC6"/>
  <text x="481" y="258" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F6FC6" text-anchor="middle">feature/booking-flow</text>
  <rect x="556" y="170" width="40" height="20" rx="6" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.3"/>
  <text x="576" y="184" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#0F6FC6" text-anchor="middle">PR</text>

  <!-- ===== feature branch 2 ===== -->
  <path d="M600,150 C 632,150 632,316 666,316" fill="none" stroke="#2E7D9A" stroke-width="2.5"/>
  <line x1="666" y1="316" x2="760" y2="316" stroke="#2E7D9A" stroke-width="2.5"/>
  <path d="M760,316 C 800,316 800,150 820,150" fill="none" stroke="#2E7D9A" stroke-width="2.5"/>
  <circle cx="666" cy="316" r="7" fill="#2E7D9A"/>
  <circle cx="760" cy="316" r="7" fill="#2E7D9A"/>
  <text x="713" y="342" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2E7D9A" text-anchor="middle">fix/cross-site-cookie</text>
  <rect x="786" y="170" width="40" height="20" rx="6" fill="#FFFFFF" stroke="#2E7D9A" stroke-width="1.3"/>
  <text x="806" y="184" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#2E7D9A" text-anchor="middle">PR</text>

  <!-- ===== trigger elbow to CD ===== -->
  <text x="560" y="408" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#6B7280" text-anchor="middle">merge to main triggers continuous delivery</text>
  <polyline points="900,150 900,422 305,422 305,464" fill="none" stroke="#0F6FC6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== CD pipeline ===== -->
  <rect x="140" y="466" width="330" height="74" rx="12" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="305" y="498" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="middle">CI / CD pipeline</text>
  <text x="305" y="520" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#6B7280" text-anchor="middle">install · typecheck · build · migrate</text>

  <line x1="470" y1="503" x2="556" y2="503" stroke="#0F6FC6" stroke-width="2.5"/>
  <circle cx="560" cy="503" r="4" fill="#0F6FC6"/>
  <polyline points="560,503 560,485 614,485" fill="none" stroke="#0F6FC6" stroke-width="2.5" marker-end="url(#arrow)"/>
  <polyline points="560,503 560,541 614,541" fill="none" stroke="#0F6FC6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="620" y="464" width="560" height="42" rx="10" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="2"/>
  <text x="900" y="490" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0B5294" text-anchor="middle">Railway / Render  →  deploy API + run migrations</text>
  <rect x="620" y="520" width="560" height="42" rx="10" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="2"/>
  <text x="900" y="546" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0B5294" text-anchor="middle">Vercel  →  build &amp; deploy web app</text>
</svg>
