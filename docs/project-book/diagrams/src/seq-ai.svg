<svg width="1300" height="950" viewBox="0 0 1300 950" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="seqAiTitle seqAiDesc">
  <title id="seqAiTitle">AI Health Assistant — agentic function-calling sequence</title>
  <desc id="seqAiDesc">UML sequence diagram showing how a patient message flows through the Client App, Chat API (NestJS), Google GenAI (Gemini) and the Catalog/DB during an agentic tool-calling turn, ending with persisted ChatMessage metadata and rendered lab/test cards.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
    <marker id="arrowReturn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1B8A5A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="950" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">AI Health Assistant — Agentic Tool-Calling Sequence (one user turn, streamed over SSE)</text>

  <!-- ============ LIFELINE HEAD BOXES ============ -->
  <!-- centers: Patient 130, Client 380, Chat API 660, GenAI 940, Catalog 1190 -->

  <!-- Patient -->
  <rect x="56" y="70" width="148" height="46" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="130" y="99" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Patient</text>

  <!-- Client App -->
  <rect x="304" y="70" width="152" height="46" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="380" y="99" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Client App</text>

  <!-- Chat API -->
  <rect x="572" y="70" width="176" height="46" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="660" y="93" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Chat API</text>
  <text x="660" y="109" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">NestJS</text>

  <!-- Google GenAI -->
  <rect x="852" y="70" width="176" height="46" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="940" y="93" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Google GenAI</text>
  <text x="940" y="109" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Gemini 2.5 Flash</text>

  <!-- Catalog / DB -->
  <rect x="1116" y="70" width="152" height="46" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="1192" y="93" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Catalog / DB</text>
  <text x="1192" y="109" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Prisma · Postgres</text>

  <!-- ============ LIFELINES (dashed) ============ -->
  <line x1="130" y1="116" x2="130" y2="896" stroke="#D7E3F4" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="380" y1="116" x2="380" y2="896" stroke="#D7E3F4" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="660" y1="116" x2="660" y2="896" stroke="#D7E3F4" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="940" y1="116" x2="940" y2="896" stroke="#D7E3F4" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="1192" y1="116" x2="1192" y2="896" stroke="#D7E3F4" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- ============ ACTIVATION BARS ============ -->
  <!-- Client App active most of the turn -->
  <rect x="373" y="150" width="14" height="700" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>
  <!-- Chat API active across orchestration -->
  <rect x="653" y="188" width="14" height="608" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>

  <!-- ====================================================== -->
  <!-- 1. Patient -> Client : types message -->
  <line x1="130" y1="150" x2="373" y2="150" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="158" y="135" width="186" height="18" fill="#FFFFFF"/>
  <text x="160" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">1. types "where to get a CBC?"</text>

  <!-- 2. Client -> Chat API : POST /chat/messages -->
  <line x1="387" y1="188" x2="653" y2="188" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="398" y="167" width="252" height="18" fill="#FFFFFF"/>
  <text x="400" y="180" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">2. POST /chat/messages (SSE, JWT cookie)</text>

  <!-- 3. Chat API self : build prompt + tools, persist user msg, emit meta -->
  <path d="M667,214 h54 a8,8 0 0 1 8,8 v18 a8,8 0 0 1 -8,8 h-54" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="206" width="486" height="40" fill="#FFFFFF"/>
  <text x="740" y="220" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">3. persist user ChatMessage · build prompt + tool defs (find_labs, search_tests)</text>
  <text x="740" y="237" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">     map last 20 turns to Gemini Content[]</text>

  <!-- 3b. emit meta back to client (conversationId) -->
  <line x1="653" y1="260" x2="387" y2="260" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="398" y="245" width="246" height="18" fill="#FFFFFF"/>
  <text x="400" y="258" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">SSE: { type:'meta', conversationId }</text>

  <!-- ============ LOOP FRAME ============ -->
  <rect x="430" y="286" width="800" height="430" rx="6" fill="none" stroke="#03485B" stroke-width="1.6"/>
  <path d="M430,286 h86 v20 l-14,14 h-72 z" fill="#03485B"/>
  <text x="444" y="304" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="bold" fill="#FFFFFF">loop</text>
  <text x="528" y="304" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#03485B">[function-calling rounds — up to MAX_TOOL_ROUNDS = 4]</text>

  <!-- 4. Chat API -> GenAI : generateContentStream -->
  <line x1="667" y1="336" x2="933" y2="336" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="678" y="315" width="248" height="18" fill="#FFFFFF"/>
  <text x="680" y="328" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">4. generateContentStream(prompt, tools)</text>

  <!-- GenAI activation -->
  <rect x="933" y="336" width="14" height="60" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>

  <!-- 5. GenAI -> Chat API : tool call(s) -->
  <line x1="933" y1="382" x2="667" y2="382" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="668" y="361" width="262" height="18" fill="#FFFFFF"/>
  <text x="670" y="374" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">5. functionCall: find_labs("CBC", "Cairo")</text>

  <!-- alt-ish note: if no tool call -> break to final answer -->
  <rect x="690" y="394" width="240" height="20" fill="#FFFFFF"/>
  <text x="694" y="408" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-style="italic" fill="#6B7280">if no functionCall &#8594; final answer, exit loop</text>

  <!-- 6. Chat API -> Catalog : execute tool (Prisma query) -->
  <line x1="667" y1="446" x2="1185" y2="446" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="425" width="430" height="18" fill="#FFFFFF"/>
  <text x="702" y="438" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">6. query LabTest + LabProfile  (is_active, Active labs only)</text>

  <!-- Catalog activation -->
  <rect x="1185" y="446" width="14" height="56" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>

  <!-- 7. Catalog -> Chat API : matching rows -->
  <line x1="1185" y1="490" x2="667" y2="490" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="760" y="469" width="370" height="18" fill="#FFFFFF"/>
  <text x="762" y="482" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">7. matching labs/tests (ranked, capped at 6)</text>

  <!-- 8. Chat API -> Client : emit tool event (cards) -->
  <line x1="653" y1="522" x2="387" y2="522" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="398" y="501" width="252" height="18" fill="#FFFFFF"/>
  <text x="400" y="514" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">8. SSE: { type:'tool', result: cards }</text>

  <!-- 9. Chat API -> GenAI : feed tool results back -->
  <line x1="667" y1="566" x2="933" y2="566" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="678" y="545" width="252" height="18" fill="#FFFFFF"/>
  <text x="680" y="558" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">9. append functionResponse (compact payload)</text>

  <!-- GenAI activation round 2 -->
  <rect x="933" y="566" width="14" height="74" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>

  <!-- 10. GenAI -> Chat API : streamed final answer (deltas) -->
  <line x1="933" y1="626" x2="667" y2="626" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="668" y="605" width="262" height="18" fill="#FFFFFF"/>
  <text x="670" y="618" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">10. text chunks (final summary)</text>

  <!-- 11. Chat API -> Client : emit delta events -->
  <line x1="653" y1="666" x2="387" y2="666" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="398" y="645" width="252" height="18" fill="#FFFFFF"/>
  <text x="400" y="658" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">11. SSE: { type:'delta', text } (streamed)</text>

  <!-- ============ END LOOP ============ -->

  <!-- 12. Chat API -> Catalog : persist assistant ChatMessage + metadata -->
  <line x1="667" y1="752" x2="1185" y2="752" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="731" width="446" height="18" fill="#FFFFFF"/>
  <text x="702" y="744" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">12. persist assistant ChatMessage  metadata = { tools: cards }</text>

  <!-- Catalog activation (persist) -->
  <rect x="1185" y="752" width="14" height="34" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>

  <!-- 13. Chat API -> Client : emit done -->
  <line x1="653" y1="796" x2="387" y2="796" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <rect x="398" y="775" width="252" height="18" fill="#FFFFFF"/>
  <text x="400" y="788" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">13. SSE: { type:'done', messageId }</text>

  <!-- 14. Client -> Patient : render text + interactive cards -->
  <line x1="373" y1="828" x2="130" y2="828" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="150" y="807" width="216" height="18" fill="#FFFFFF"/>
  <text x="152" y="820" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">14. render text + lab/test cards</text>

  <!-- ============ LEGEND ============ -->
  <rect x="32" y="876" width="1236" height="48" rx="8" fill="#FFFFFF" stroke="#D7E3F4" stroke-width="1.5"/>
  <line x1="56" y1="900" x2="104" y2="900" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="116" y="904" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A">synchronous call / request</text>
  <line x1="330" y1="900" x2="378" y2="900" stroke="#1B8A5A" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arrowReturn)"/>
  <text x="390" y="904" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A">return / streamed SSE event</text>
  <rect x="640" y="891" width="16" height="18" fill="#FFFFFF" stroke="#0B5294" stroke-width="1.5"/>
  <text x="664" y="904" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A">activation (object active)</text>
  <text x="880" y="904" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#6B7280">Backend orchestrates the loop; clients are thin SSE renderers (web + mobile).</text>
</svg>
