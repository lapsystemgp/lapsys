<svg width="1250" height="900" viewBox="0 0 1250 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TesTly booking and payment sequence diagram</title>
  <desc id="desc">UML sequence diagram showing search, booking creation as Pending, online PayMob payment with callback verification, success transitions to Paid and Confirmed, persistence of a BookingStatusEvent, confirmation notification, and a note for cash methods.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
    <marker id="arrowRet" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1250" height="900" fill="#FFFFFF"/>

  <!-- Diagram title -->
  <text x="32" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">Sequence: Test Booking &amp; Payment (TesTly)</text>
  <text x="32" y="66" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">Online (PayMob) prepaid flow — bookings module (createBooking, demoOnlinePayment, setLabBookingStatus)</text>

  <!-- ===== Lifeline head boxes ===== -->
  <!-- x-centres: Patient 150, Client App 380, NestJS API 630, Payment 880, Database 1120 -->

  <!-- Patient -->
  <rect x="70" y="92" width="160" height="48" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="150" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">Patient</text>

  <!-- Client App -->
  <rect x="300" y="92" width="160" height="48" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="380" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">Client App</text>

  <!-- NestJS API -->
  <rect x="550" y="92" width="160" height="48" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="630" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">NestJS API</text>

  <!-- Payment (PayMob) -->
  <rect x="800" y="92" width="160" height="48" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="880" y="116" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">Payment</text>
  <text x="880" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">(PayMob)</text>

  <!-- Database -->
  <rect x="1040" y="92" width="160" height="48" rx="10" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="1120" y="122" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294">Database</text>

  <!-- ===== Lifelines (dashed) ===== -->
  <line x1="150"  y1="140" x2="150"  y2="836" stroke="#0B5294" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="380"  y1="140" x2="380"  y2="836" stroke="#0B5294" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="630"  y1="140" x2="630"  y2="836" stroke="#0B5294" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="880"  y1="140" x2="880"  y2="836" stroke="#0B5294" stroke-width="1.5" stroke-dasharray="6 5"/>
  <line x1="1120" y1="140" x2="1120" y2="836" stroke="#0B5294" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- ============================================================= -->
  <!-- Messages. Each: line + white label rect + label text          -->
  <!-- ============================================================= -->

  <!-- 1. search labs/tests  Patient -> Client App -->
  <line x1="150" y1="175" x2="372" y2="175" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="172" y="162" width="172" height="18" fill="#FFFFFF"/>
  <text x="178" y="175" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">1. search labs / tests</text>

  <!-- 2. GET /public/labs,/public/tests  Client App -> NestJS API -->
  <line x1="380" y1="205" x2="622" y2="205" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="392" y="192" width="226" height="18" fill="#FFFFFF"/>
  <text x="398" y="205" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">2. GET active labs / tests</text>

  <!-- 3. query (Active only)  NestJS API -> Database -->
  <line x1="630" y1="235" x2="1112" y2="235" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="222" width="270" height="18" fill="#FFFFFF"/>
  <text x="706" y="235" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">3. query labs/tests (onboarding=Active)</text>

  <!-- 4. return list  Database -> ... -> Patient (dashed return) -->
  <line x1="1120" y1="263" x2="158" y2="263" stroke="#6B7280" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowRet)"/>
  <rect x="470" y="250" width="190" height="18" fill="#FFFFFF"/>
  <text x="476" y="263" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">4. return marketplace list</text>

  <!-- 5. select test & slot  Patient -> Client App -->
  <line x1="150" y1="296" x2="372" y2="296" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="166" y="283" width="196" height="18" fill="#FFFFFF"/>
  <text x="172" y="296" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">5. select test &amp; time slot</text>

  <!-- 6. POST /bookings  Client App -> NestJS API -->
  <line x1="380" y1="326" x2="622" y2="326" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="392" y="313" width="226" height="18" fill="#FFFFFF"/>
  <text x="398" y="326" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">6. POST /bookings (create)</text>

  <!-- API self-activation box for createBooking transaction -->
  <rect x="626" y="338" width="8" height="56" fill="#0F6FC6" opacity="0.18"/>

  <!-- 7. $transaction: insert Booking (Pending) + first BookingStatusEvent  NestJS API -> Database -->
  <line x1="634" y1="356" x2="1112" y2="356" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="660" y="343" width="370" height="18" fill="#FFFFFF"/>
  <text x="666" y="356" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">7. $transaction: Booking{status=Pending, payment=Pending}</text>
  <rect x="660" y="361" width="370" height="18" fill="#FFFFFF"/>
  <text x="666" y="374" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">+ BookingStatusEvent ("Booking created by patient")</text>

  <!-- 8. notify lab (FCM "New Booking") -->
  <line x1="630" y1="416" x2="372" y2="416" stroke="#1B8A5A" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="400" y="403" width="232" height="18" fill="#FFFFFF"/>
  <text x="406" y="416" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">8. FCM "New Booking" -&gt; lab</text>

  <!-- 9. initiate online payment  Patient -> Client App -> API -->
  <line x1="150" y1="448" x2="372" y2="448" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="158" y="435" width="212" height="18" fill="#FFFFFF"/>
  <text x="164" y="448" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">9. pay online (method=Online)</text>

  <!-- 10. initiate payment session  API -> Payment -->
  <line x1="630" y1="478" x2="872" y2="478" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="640" y="465" width="232" height="18" fill="#FFFFFF"/>
  <text x="646" y="478" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">10. initiate online payment</text>

  <!-- 11. payment page  Payment -> Patient (dashed return) -->
  <line x1="880" y1="508" x2="158" y2="508" stroke="#6B7280" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowRet)"/>
  <rect x="420" y="495" width="230" height="18" fill="#FFFFFF"/>
  <text x="426" y="508" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">11. redirect to payment page</text>

  <!-- 12. patient pays on gateway  Patient -> Payment -->
  <line x1="150" y1="538" x2="872" y2="538" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="380" y="525" width="220" height="18" fill="#FFFFFF"/>
  <text x="386" y="538" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">12. enter card &amp; pay on gateway</text>

  <!-- 13. result callback  Payment -> API -->
  <line x1="880" y1="568" x2="638" y2="568" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="640" y="555" width="232" height="18" fill="#FFFFFF"/>
  <text x="646" y="568" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">13. payment result callback</text>

  <!-- API self box: verify -->
  <rect x="626" y="580" width="8" height="118" fill="#0F6FC6" opacity="0.18"/>

  <!-- 14. verify signature / status  API self-message -->
  <path d="M634 596 H700 V614 H638" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="704" y="591" width="200" height="18" fill="#FFFFFF"/>
  <text x="710" y="604" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">14. verify callback (demoOnlinePayment)</text>

  <!-- ===== alt/success frame ===== -->
  <rect x="500" y="630" width="700" height="170" rx="6" fill="none" stroke="#0B5294" stroke-width="1.5"/>
  <path d="M500 630 h66 v20 l-12 12 h-54 z" fill="#0B5294"/>
  <text x="510" y="645" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">alt</text>
  <text x="576" y="645" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#1B8A5A">[ payment success ]</text>

  <!-- 15. set Payment=Paid (DEMO-PAY ref) + Booking events  API -> Database -->
  <line x1="634" y1="672" x2="1112" y2="672" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="648" y="659" width="396" height="18" fill="#FFFFFF"/>
  <text x="654" y="672" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">15. UPDATE payment_status=Paid, payment_paid_at, ref</text>

  <!-- 16. lab confirms (gated on Paid) -> Booking=Confirmed + persist event  API -> Database -->
  <line x1="634" y1="706" x2="1112" y2="706" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="648" y="693" width="430" height="18" fill="#FFFFFF"/>
  <text x="654" y="706" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">16. status=Confirmed + persist BookingStatusEvent (gated: Paid)</text>

  <!-- 17. confirmation notification  API -> Patient (label kept clear of cash note, x>=470) -->
  <line x1="630" y1="738" x2="478" y2="738" stroke="#1B8A5A" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="486" y="725" width="320" height="18" fill="#FFFFFF"/>
  <text x="492" y="738" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1B8A5A">17. FCM "Booking Confirmed" -&gt; patient</text>

  <!-- failure sub-branch divider -->
  <line x1="500" y1="758" x2="1200" y2="758" stroke="#0B5294" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="514" y="780" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#C0392B">[ payment failure ]</text>
  <text x="640" y="780" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#C0392B">set payment_status=Failed (reason, failed_at); booking stays Pending.</text>

  <!-- ===== Cash methods note ===== -->
  <rect x="32" y="630" width="430" height="118" rx="10" fill="#FFFFFF" stroke="#1B8A5A" stroke-width="2"/>
  <path d="M32 630 h26 v18 h-26 z" fill="#1B8A5A"/>
  <text x="45" y="643" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">note</text>
  <text x="68" y="643" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1B8A5A">Cash methods (no online payment)</text>
  <text x="48" y="668" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">CashLabVisit / CashHomeCollection / CashOnDelivery:</text>
  <text x="48" y="688" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">steps 9-15 are skipped. The lab may set status =</text>
  <text x="48" y="708" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Confirmed before collection (no Paid required).</text>
  <text x="48" y="728" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">markCashCollected later sets payment_status = Paid.</text>

  <!-- Legend -->
  <rect x="32" y="852" width="1186" height="34" rx="8" fill="#FFFFFF" stroke="#D7E3F4" stroke-width="1.5"/>
  <line x1="52" y1="869" x2="92" y2="869" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="100" y="873" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">synchronous call</text>
  <line x1="232" y1="869" x2="272" y2="869" stroke="#6B7280" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowRet)"/>
  <text x="280" y="873" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">response / redirect</text>
  <line x1="430" y1="869" x2="470" y2="869" stroke="#1B8A5A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="478" y="873" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">FCM push notification</text>
  <rect x="648" y="861" width="14" height="14" fill="#0F6FC6" opacity="0.18"/>
  <text x="670" y="873" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">API activation / $transaction</text>
  <text x="900" y="873" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">Source: research/backend.md §6 Bookings &amp; Payments</text>
</svg>
