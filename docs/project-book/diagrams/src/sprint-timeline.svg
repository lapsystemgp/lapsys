<svg width="1300" height="700" viewBox="0 0 1300 700" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1300" height="700" fill="#FFFFFF"/>

  <text x="32" y="46" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">TesTly — Phased Delivery Timeline</text>
  <text x="32" y="70" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">Agile, sprint-style increments delivered across the graduation year</text>

  <!-- sprint gridlines + headers -->
  <g font-family="Arial, Helvetica, sans-serif">
    <line x1="400" y1="96" x2="400" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="508" y1="96" x2="508" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="616" y1="96" x2="616" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="724" y1="96" x2="724" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="832" y1="96" x2="832" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="940" y1="96" x2="940" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="1048" y1="96" x2="1048" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="1156" y1="96" x2="1156" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <line x1="1264" y1="96" x2="1264" y2="676" stroke="#D7E3F4" stroke-width="1"/>
    <text x="454" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S1</text>
    <text x="562" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S2</text>
    <text x="670" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S3</text>
    <text x="778" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S4</text>
    <text x="886" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S5</text>
    <text x="994" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S6</text>
    <text x="1102" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S7</text>
    <text x="1210" y="114" font-size="12.5" font-weight="bold" fill="#0B5294" text-anchor="middle">S8</text>
  </g>

  <!-- rows: phase labels (left) + Gantt bars (right) -->
  <g font-family="Arial, Helvetica, sans-serif">
    <!-- Row 1 -->
    <text x="40" y="174" font-size="13.5" font-weight="bold" fill="#0B5294">Foundation</text>
    <text x="40" y="191" font-size="11" fill="#6B7280">schema · auth · marketplace</text>
    <rect x="400" y="158" width="216" height="40" rx="8" fill="#0F6FC6"/>

    <!-- Row 2 -->
    <text x="40" y="250" font-size="13.5" font-weight="bold" fill="#0B5294">Bookings &amp; Payments</text>
    <text x="40" y="267" font-size="11" fill="#6B7280">lifecycle · payment states</text>
    <rect x="508" y="234" width="216" height="40" rx="8" fill="#0F6FC6"/>

    <!-- Row 3 -->
    <text x="40" y="326" font-size="13.5" font-weight="bold" fill="#0B5294">Workspaces</text>
    <text x="40" y="343" font-size="11" fill="#6B7280">patient &amp; lab dashboards</text>
    <rect x="616" y="310" width="216" height="40" rx="8" fill="#0F6FC6"/>

    <!-- Row 4 -->
    <text x="40" y="402" font-size="13.5" font-weight="bold" fill="#0B5294">Structured Results</text>
    <text x="40" y="419" font-size="11" fill="#6B7280">canonical markers · trends</text>
    <rect x="724" y="386" width="216" height="40" rx="8" fill="#0F6FC6"/>

    <!-- Row 5 -->
    <text x="40" y="478" font-size="13.5" font-weight="bold" fill="#0B5294">Privacy Toggle</text>
    <text x="40" y="495" font-size="11" fill="#6B7280">cross-lab sharing control</text>
    <rect x="832" y="462" width="108" height="40" rx="8" fill="#0F6FC6"/>

    <!-- Row 6 -->
    <text x="40" y="554" font-size="13.5" font-weight="bold" fill="#0B5294">Home Logistics &amp; Search</text>
    <text x="40" y="571" font-size="11" fill="#6B7280">kits · coordinates · indexes</text>
    <rect x="832" y="538" width="216" height="40" rx="8" fill="#0F6FC6"/>

    <!-- Row 7 -->
    <text x="40" y="630" font-size="13.5" font-weight="bold" fill="#03485B">AI Assistant &amp; Hardening</text>
    <text x="40" y="647" font-size="11" fill="#6B7280">agentic chat · production-ready</text>
    <rect x="940" y="614" width="324" height="40" rx="8" fill="#03485B"/>
    <text x="1102" y="639" font-size="11.5" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Phase 7</text>
  </g>

  <text x="832" y="696" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#6B7280" text-anchor="middle">graduation year  →</text>
</svg>
