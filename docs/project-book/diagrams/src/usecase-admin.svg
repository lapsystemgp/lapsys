<svg width="1000" height="750" viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="750" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">Use-Case Diagram &#8212; Admin (TesTly Platform Governance)</text>

  <!-- System boundary -->
  <rect x="300" y="72" width="668" height="650" rx="14" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="634" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#0B5294">TesTly</text>
  <line x1="300" y1="114" x2="968" y2="114" stroke="#D7E3F4" stroke-width="1.5"/>

  <!-- ===================== ACTOR: Admin ===================== -->
  <g font-family="Arial, Helvetica, sans-serif">
    <!-- stick figure -->
    <circle cx="120" cy="360" r="20" fill="#E8F0FB" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="120" y1="380" x2="120" y2="432" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="86" y1="400" x2="154" y2="400" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="120" y1="432" x2="92" y2="472" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="120" y1="432" x2="148" y2="472" stroke="#0B5294" stroke-width="2.5"/>
    <text x="120" y="500" text-anchor="middle" font-size="17" font-weight="bold" fill="#03485B">Admin</text>
    <text x="120" y="520" text-anchor="middle" font-size="12" fill="#6B7280">@Roles(Role.Admin)</text>
  </g>

  <!-- ===================== USE-CASE OVALS ===================== -->
  <!-- Geometry note: ovals rx=118 ry=33 unless stated -->
  <g font-family="Arial, Helvetica, sans-serif">

    <!-- Review Lab Onboarding -->
    <ellipse cx="470" cy="160" rx="124" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="470" y="156" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Review Lab</text>
    <text x="470" y="174" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Onboarding</text>

    <!-- Approve Lab -->
    <ellipse cx="470" cy="260" rx="118" ry="33" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="470" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Approve Lab</text>

    <!-- Reject Lab -->
    <ellipse cx="470" cy="345" rx="118" ry="33" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="470" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Reject Lab</text>

    <!-- Suspend Lab -->
    <ellipse cx="470" cy="430" rx="118" ry="33" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="470" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Suspend Lab</text>

    <!-- View Platform Transactions -->
    <ellipse cx="470" cy="525" rx="130" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="470" y="521" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">View Platform</text>
    <text x="470" y="539" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Transactions</text>

    <!-- Oversee Users -->
    <ellipse cx="470" cy="620" rx="118" ry="33" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="470" y="625" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Oversee Users</text>

    <!-- Moderate Reviews -->
    <ellipse cx="800" cy="525" rx="118" ry="33" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="800" y="530" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Moderate Reviews</text>

    <!-- Manage FAQ Entries -->
    <ellipse cx="800" cy="620" rx="118" ry="33" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="800" y="625" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">Manage FAQ Entries</text>

    <!-- Validate Onboarding Readiness (included use case) -->
    <ellipse cx="800" cy="225" rx="130" ry="40" fill="#FFFFFF" stroke="#0B5294" stroke-width="2" stroke-dasharray="0"/>
    <text x="800" y="216" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B5294">Validate Onboarding</text>
    <text x="800" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#0B5294">Readiness</text>
    <text x="800" y="251" text-anchor="middle" font-size="11" fill="#6B7280">(5-point gate)</text>

  </g>

  <!-- ===================== ASSOCIATIONS (Actor -> Use cases) ===================== -->
  <!-- plain associations: solid line, no arrowhead per UML; we use thin solid lines -->
  <g stroke="#0F6FC6" stroke-width="2" fill="none">
    <line x1="154" y1="392" x2="350" y2="172"/>
    <line x1="154" y1="394" x2="356" y2="258"/>
    <line x1="156" y1="402" x2="354" y2="342"/>
    <line x1="156" y1="408" x2="354" y2="428"/>
    <line x1="154" y1="416" x2="344" y2="520"/>
    <line x1="150" y1="430" x2="356" y2="616"/>
  </g>

  <!-- Associations that route to the right column (Moderate Reviews, Manage FAQ) -->
  <!-- Routed cleanly along the bottom margin, below all ovals, to avoid crossings -->
  <g stroke="#0F6FC6" stroke-width="2" fill="none">
    <path d="M132,475 C 150,640 330,690 560,690 C 680,690 740,610 758,553"/>
    <path d="M124,470 C 130,660 360,705 600,705 C 720,705 770,680 740,650"/>
  </g>

  <!-- ===================== INCLUDE RELATIONSHIPS ===================== -->
  <!-- Approve/Reject/Suspend «include» Validate Onboarding Readiness -->
  <g stroke="#0F6FC6" stroke-width="2" stroke-dasharray="7,5" fill="none">
    <line x1="588" y1="255" x2="672" y2="232" marker-end="url(#arrow)"/>
    <line x1="588" y1="343" x2="678" y2="248" marker-end="url(#arrow)"/>
    <line x1="588" y1="428" x2="676" y2="258" marker-end="url(#arrow)"/>
  </g>
  <!-- «include» labels on white tiles -->
  <rect x="600" y="232" width="74" height="18" fill="#FFFFFF"/>
  <text x="637" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">&#171;include&#187;</text>
  <rect x="600" y="300" width="74" height="18" fill="#FFFFFF"/>
  <text x="637" y="313" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">&#171;include&#187;</text>
  <rect x="600" y="360" width="74" height="18" fill="#FFFFFF"/>
  <text x="637" y="373" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280">&#171;include&#187;</text>

  <!-- ===================== Legend ===================== -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="32" y="92" width="232" height="118" rx="10" fill="#FFFFFF" stroke="#D7E3F4" stroke-width="1.5"/>
    <text x="48" y="116" font-size="13" font-weight="bold" fill="#0B5294">Legend</text>

    <line x1="48" y1="136" x2="92" y2="136" stroke="#0F6FC6" stroke-width="2"/>
    <text x="100" y="140" font-size="12" fill="#1A1A1A">association</text>

    <line x1="48" y1="160" x2="92" y2="160" stroke="#0F6FC6" stroke-width="2" stroke-dasharray="7,5"/>
    <text x="100" y="164" font-size="12" fill="#1A1A1A">&#171;include&#187; dependency</text>

    <ellipse cx="60" cy="186" rx="12" ry="8" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="100" y="190" font-size="12" fill="#1A1A1A">admin use case</text>
  </g>

</svg>
