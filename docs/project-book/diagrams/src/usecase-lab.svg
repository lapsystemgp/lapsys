<svg width="1120" height="820" viewBox="0 0 1120 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
    <marker id="openarrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M1,1 L11,5 L1,9" fill="none" stroke="#6B7280" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1120" height="820" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">TesTly — Use-Case Diagram: Lab Staff</text>
  <text x="32" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">Authenticated lab-workspace actions (role: LabStaff; most require onboarding_status = Active)</text>

  <!-- ===================== ACTOR ===================== -->
  <g>
    <circle cx="92" cy="408" r="20" fill="#FFFFFF" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="92" y1="428" x2="92" y2="478" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="60" y1="446" x2="124" y2="446" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="92" y1="478" x2="66" y2="516" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="92" y1="478" x2="118" y2="516" stroke="#0B5294" stroke-width="2.5"/>
    <text x="92" y="544" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Lab Staff</text>
    <text x="92" y="564" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">(LabStaff role)</text>
  </g>

  <!-- ===================== SYSTEM BOUNDARY ===================== -->
  <rect x="300" y="92" width="792" height="660" rx="14" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="696" y="120" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#0B5294" text-anchor="middle">TesTly Platform</text>
  <line x1="300" y1="132" x2="1092" y2="132" stroke="#D7E3F4" stroke-width="1.5"/>

  <!-- ===================== ASSOCIATION LINES (under ovals) ===================== -->
  <!-- Left column oval centers x=472; row y = 192,272,352,432,512,592,672 -->
  <line x1="124" y1="446" x2="386" y2="192" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="124" y1="446" x2="386" y2="272" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="124" y1="446" x2="386" y2="352" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="124" y1="446" x2="386" y2="432" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="124" y1="446" x2="386" y2="512" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="124" y1="446" x2="386" y2="592" stroke="#0F6FC6" stroke-width="2"/>
  <line x1="124" y1="446" x2="386" y2="672" stroke="#0F6FC6" stroke-width="2"/>

  <!-- ===================== LEFT-COLUMN OVALS (actor-associated base use cases) ===================== -->
  <!-- 1. Register Lab / Onboard -->
  <ellipse cx="478" cy="192" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="187" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Register Lab /</text>
  <text x="478" y="205" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Onboard</text>

  <!-- 2. Manage Test Catalog -->
  <ellipse cx="478" cy="272" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="267" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Manage Test</text>
  <text x="478" y="285" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Catalog</text>

  <!-- 3. Manage Schedule Slots -->
  <ellipse cx="478" cy="352" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="347" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Manage Schedule</text>
  <text x="478" y="365" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Slots</text>

  <!-- 4. View & Confirm Bookings -->
  <ellipse cx="478" cy="432" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="427" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">View &amp; Confirm</text>
  <text x="478" y="445" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Bookings</text>

  <!-- 5. Upload Result PDF -->
  <ellipse cx="478" cy="512" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="507" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Upload Result</text>
  <text x="478" y="525" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">PDF</text>

  <!-- 6. Manage Lab Profile -->
  <ellipse cx="478" cy="592" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="587" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Manage Lab</text>
  <text x="478" y="605" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Profile</text>

  <!-- 7. View Reviews -->
  <ellipse cx="478" cy="672" rx="92" ry="34" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
  <text x="478" y="677" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">View Reviews</text>

  <!-- ===================== RIGHT-COLUMN OVALS (include / extend use cases) ===================== -->
  <!-- Set Test Pricing  <<extend>> Manage Test Catalog -->
  <ellipse cx="810" cy="272" rx="88" ry="34" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="810" y="267" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Set Test</text>
  <text x="810" y="285" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Pricing</text>

  <!-- Reject Booking <<extend>> View & Confirm Bookings -->
  <ellipse cx="810" cy="432" rx="88" ry="34" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="810" y="437" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Reject Booking</text>

  <!-- Enter Structured Results <<include>> Upload Result PDF -->
  <ellipse cx="810" cy="512" rx="88" ry="34" fill="#FFFFFF" stroke="#0B5294" stroke-width="2"/>
  <text x="810" y="507" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Enter Structured</text>
  <text x="810" y="525" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Results</text>

  <!-- ===================== INCLUDE / EXTEND DEPENDENCIES ===================== -->
  <!-- Set Test Pricing extends Manage Test Catalog -->
  <line x1="722" y1="272" x2="572" y2="272" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#openarrow)"/>
  <rect x="608" y="252" width="78" height="18" rx="3" fill="#FFFFFF"/>
  <text x="647" y="265" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">«extend»</text>

  <!-- Reject Booking extends View and Confirm Bookings -->
  <line x1="722" y1="432" x2="572" y2="432" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#openarrow)"/>
  <rect x="608" y="412" width="78" height="18" rx="3" fill="#FFFFFF"/>
  <text x="647" y="425" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">«extend»</text>

  <!-- Enter Structured Results includes Upload Result PDF (structured requires PDF first) -->
  <line x1="722" y1="512" x2="572" y2="512" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#openarrow)"/>
  <rect x="606" y="492" width="82" height="18" rx="3" fill="#FFFFFF"/>
  <text x="647" y="505" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">«include»</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="724" y="640" width="344" height="90" rx="10" fill="#FFFFFF" stroke="#D7E3F4" stroke-width="1.5"/>
  <text x="744" y="667" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#0B5294">Legend</text>
  <line x1="744" y1="690" x2="784" y2="690" stroke="#0F6FC6" stroke-width="2"/>
  <text x="794" y="694" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">association (actor performs use case)</text>
  <line x1="744" y1="714" x2="784" y2="714" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#openarrow)"/>
  <text x="794" y="718" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">«include» / «extend» dependency</text>

</svg>
