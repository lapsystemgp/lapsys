<svg width="1120" height="920" viewBox="0 0 1120 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0F6FC6"/>
    </marker>
    <marker id="arrowOpen" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7" fill="none" stroke="#6B7280" stroke-width="1.3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1120" height="920" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#03485B">TesTly — Patient Use-Case Diagram</text>
  <text x="32" y="66" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">UML use cases for the Patient actor across the web (Next.js) and mobile (Flutter) clients</text>

  <!-- ===================== ACTOR: Patient ===================== -->
  <g>
    <!-- stick figure -->
    <circle cx="92" cy="430" r="20" fill="#FFFFFF" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="92" y1="450" x2="92" y2="508" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="58" y1="472" x2="126" y2="472" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="92" y1="508" x2="64" y2="552" stroke="#0B5294" stroke-width="2.5"/>
    <line x1="92" y1="508" x2="120" y2="552" stroke="#0B5294" stroke-width="2.5"/>
    <text x="92" y="582" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#0B5294" text-anchor="middle">Patient</text>
  </g>

  <!-- ===================== SYSTEM BOUNDARY ===================== -->
  <rect x="392" y="96" width="700" height="800" rx="14" fill="#FFFFFF" stroke="#0B5294" stroke-width="2.5"/>
  <text x="742" y="128" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#0B5294" text-anchor="middle">TesTly</text>
  <line x1="392" y1="142" x2="1092" y2="142" stroke="#D7E3F4" stroke-width="1.5"/>

  <!-- ===================== USE-CASE OVALS ===================== -->
  <!-- Row 1 -->
  <g>
    <ellipse cx="540" cy="186" rx="120" ry="30" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="540" y="191" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="middle">Register / Login</text>
  </g>
  <g>
    <ellipse cx="864" cy="186" rx="148" ry="30" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="864" y="191" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="middle">Search &amp; Filter Labs</text>
  </g>

  <!-- Row 2 -->
  <g>
    <ellipse cx="540" cy="262" rx="138" ry="30" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="540" y="259" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">View Lab &amp; Test</text>
    <text x="540" y="275" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Details</text>
  </g>
  <g>
    <ellipse cx="876" cy="262" rx="150" ry="30" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="876" y="267" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="middle">Chat with AI Assistant</text>
  </g>

  <!-- Row 3: Book Test (parent with includes) -->
  <g>
    <ellipse cx="560" cy="372" rx="128" ry="32" fill="#E8F0FB" stroke="#0B5294" stroke-width="2.5"/>
    <text x="560" y="377" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#0B5294" text-anchor="middle">Book Test</text>
  </g>
  <!-- Make Payment (parent with includes) -->
  <g>
    <ellipse cx="876" cy="372" rx="128" ry="32" fill="#E8F0FB" stroke="#0B5294" stroke-width="2.5"/>
    <text x="876" y="377" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#0B5294" text-anchor="middle">Make Payment</text>
  </g>

  <!-- Book Test variants (extend) -->
  <g>
    <ellipse cx="470" cy="470" rx="68" ry="26" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.8"/>
    <text x="470" y="475" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A" text-anchor="middle">Lab Visit</text>
  </g>
  <g>
    <ellipse cx="470" cy="528" rx="84" ry="26" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.8"/>
    <text x="470" y="533" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A" text-anchor="middle">Home Collection</text>
  </g>
  <g>
    <ellipse cx="568" cy="558" rx="80" ry="26" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.8"/>
    <text x="568" y="563" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A" text-anchor="middle">Home Test Kit</text>
  </g>

  <!-- Payment variants (extend) -->
  <g>
    <ellipse cx="950" cy="470" rx="74" ry="26" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.8"/>
    <text x="950" y="475" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A" text-anchor="middle">Pay Online</text>
  </g>
  <g>
    <ellipse cx="958" cy="528" rx="66" ry="26" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.8"/>
    <text x="958" y="533" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#1A1A1A" text-anchor="middle">Pay Cash</text>
  </g>

  <!-- Row 4 -->
  <g>
    <ellipse cx="546" cy="648" rx="138" ry="30" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="546" y="653" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="middle">Track Booking Status</text>
  </g>
  <g>
    <ellipse cx="876" cy="648" rx="110" ry="30" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="876" y="653" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0B5294" text-anchor="middle">View Results</text>
  </g>

  <!-- Row 5 -->
  <g>
    <ellipse cx="546" cy="724" rx="150" ry="32" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="546" y="721" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">View Cross-Lab</text>
    <text x="546" y="737" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Health Trends</text>
  </g>
  <g>
    <ellipse cx="876" cy="724" rx="142" ry="32" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="876" y="721" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Leave Review</text>
    <text x="876" y="737" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">&amp; Rating</text>
  </g>

  <!-- Row 6 -->
  <g>
    <ellipse cx="546" cy="824" rx="152" ry="32" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="546" y="821" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Manage Profile</text>
    <text x="546" y="837" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">&amp; Privacy</text>
  </g>
  <g>
    <ellipse cx="876" cy="824" rx="142" ry="32" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="876" y="821" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Receive</text>
    <text x="876" y="837" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="bold" fill="#0B5294" text-anchor="middle">Notifications</text>
  </g>

  <!-- ===================== ACTOR ASSOCIATIONS (actor -> oval) =====================
       All associations fan out from a single hub point just right of the actor so
       the diagram reads as one clean star; each line lands on the left edge of its
       target oval (never inside the label text). Right-column lines pass through the
       column gap (x≈700) rather than cutting across the left-column ovals. -->

  <!-- Left column ovals: land on their left edge -->
  <line x1="132" y1="472" x2="418" y2="192" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="132" y1="472" x2="400" y2="262" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="132" y1="472" x2="430" y2="368" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="132" y1="472" x2="406" y2="646" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="132" y1="472" x2="394" y2="720" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="132" y1="472" x2="392" y2="820" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Right column ovals: a single shared "bus" keeps these lines out of the
       left-column labels. Each line drops from the hub into a clear horizontal
       feeder band (y=606, below the variant ovals / above Track Booking), runs up
       the clear vertical channel at x=706 (between the two oval columns), then
       turns into its target oval's left edge. -->
  <polyline points="132,472 220,606 706,606 706,186 714,186" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="132,472 220,606 706,606 706,262 724,262" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="132,472 220,606 706,606 706,350 768,350" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="132,472 220,606 706,606 706,648 764,648" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="132,472 220,606 706,606 706,724 732,724" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="132,472 220,606 706,606 706,824 732,824" fill="none" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- hub dot at the actor's hand to anchor the fan -->
  <circle cx="132" cy="472" r="3.5" fill="#0F6FC6"/>

  <!-- ===================== EXTEND RELATIONSHIPS (variant -> parent) ===================== -->
  <!-- Book Test extends -->
  <line x1="498" y1="448" x2="528" y2="398" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>
  <line x1="498" y1="510" x2="522" y2="400" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>
  <line x1="568" y1="532" x2="562" y2="406" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>
  <!-- Payment extends -->
  <line x1="930" y1="448" x2="892" y2="400" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>
  <line x1="940" y1="506" x2="888" y2="402" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>

  <!-- ===================== INCLUDE: Book Test ..includes.. Make Payment ===================== -->
  <line x1="672" y1="388" x2="763" y2="388" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>
  <rect x="636" y="372" width="56" height="17" fill="#FFFFFF"/>
  <text x="664" y="384" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">«include»</text>

  <!-- extend / include legend labels (small, on white) -->
  <rect x="500" y="430" width="62" height="16" fill="#FFFFFF"/>
  <text x="531" y="442" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#6B7280" text-anchor="middle">«extend»</text>
  <rect x="900" y="430" width="62" height="16" fill="#FFFFFF"/>
  <text x="931" y="442" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#6B7280" text-anchor="middle">«extend»</text>

  <!-- ===================== LEGEND ===================== -->
  <g>
    <rect x="32" y="700" width="320" height="156" rx="10" fill="#FFFFFF" stroke="#D7E3F4" stroke-width="1.5"/>
    <text x="48" y="726" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#03485B">Legend</text>

    <ellipse cx="64" cy="752" rx="18" ry="11" fill="#E8F0FB" stroke="#0B5294" stroke-width="2"/>
    <text x="92" y="756" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Primary use case</text>

    <ellipse cx="64" cy="784" rx="18" ry="11" fill="#FFFFFF" stroke="#0F6FC6" stroke-width="1.8"/>
    <text x="92" y="788" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Variant / sub use case</text>

    <line x1="48" y1="814" x2="82" y2="814" stroke="#0F6FC6" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="92" y="818" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">Association (actor uses)</text>

    <line x1="48" y1="842" x2="82" y2="842" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrowOpen)"/>
    <text x="92" y="846" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A1A1A">«include» / «extend»</text>
  </g>
</svg>
