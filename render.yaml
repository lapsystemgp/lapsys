services:
  - type: web
    name: testly-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: LAB_STORAGE_DRIVER
        value: local
